name: CI

on:
  pull_request:
  push:
    branches: [main]

# Annule les runs obsolètes sur une même branche/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck / lint / test / build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `tsc --noEmit` seul ne vérifie RIEN : la racine tsconfig.json a
      # "files": [] et ne fait que référencer les sous-projets. Il faut cibler
      # explicitement tsconfig.app.json (src/) et tsconfig.node.json (vite.config).
      - name: Typecheck
        run: npm run typecheck

      # Seules les ERREURS bloquent. Les warnings (dette connue :
      # no-explicit-any, exhaustive-deps, unused-vars) sont comptés et
      # affichés, mais ne font pas échouer la CI.
      #
      # Un plafond figé de type cliquet a été essayé puis retiré : Lovable
      # committe du code généré en continu, donc le compteur monte tout seul
      # et la CI passait au rouge sur des `any` ajoutés automatiquement,
      # sans qu'aucun vrai problème n'existe. Des alertes qui crient pour
      # du bruit finissent par être ignorées, y compris quand elles ont
      # raison — c'est exactement ce qu'on ne veut pas d'une CI.
      - name: Lint
        run: npm run lint

      - name: Décompte des warnings (informatif)
        if: always()
        run: |
          COUNT=$(npx eslint . -f json 2>/dev/null \
            | python3 -c "import json,sys; print(sum(f['warningCount'] for f in json.load(sys.stdin)))")
          echo "### Lint : $COUNT warnings (non bloquant)" >> "$GITHUB_STEP_SUMMARY"

      - name: Test
        run: npm test

      # Le build régénère aussi supabase/functions/mcp/ via le plugin Vite
      # @lovable.dev/mcp-js (voir vite.config.ts).
      - name: Build
        run: npm run build

      # Le code de l'edge function MCP est généré à partir de src/lib/mcp/.
      # Si le build produit un diff, c'est que la version commitée est périmée.
      - name: Vérifier que l'edge function MCP générée est à jour
        run: git diff --exit-code -- supabase/functions/mcp
